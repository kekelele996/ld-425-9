name: home-renovation

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: home_renovation
      MYSQL_USER: renovation
      MYSQL_PASSWORD: renovation123
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -urenovation -prenovation123 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: renovation
      DB_PASSWORD: renovation123
      DB_NAME: home_renovation
      JWT_SECRET: change-me
      PORT: 3000
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  backend-uploads:
